name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: assemble
        run: ./gradlew --no-daemon check assemble :moss-api:bootJar

      - name: cyclonedx sbom
        run: ./gradlew --no-daemon cyclonedxBom
        continue-on-error: true

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moss-api/build/libs/*.jar
            build/reports/bom.xml
          generate_release_notes: true

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: push image
        run: ./gradlew --no-daemon :moss-api:jib -Djib.to.image=ghcr.io/${{ github.repository }}:${{ github.ref_name }} -Djib.to.auth.username=${{ github.actor }} -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
