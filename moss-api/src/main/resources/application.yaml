spring:
  application:
    name: stripe-eu-vat-moss
  main:
    web-application-type: servlet

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: stripe-eu-vat-moss

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
